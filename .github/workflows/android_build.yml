name: Build Bharat Cash Gold APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ylbuuvimelaariosriwk.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsYnV1dmltZWxhYXJpb3NyaXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2NTE1MjksImV4cCI6MjA4NTIyNzUyOX0.G9bmLzE2ScnNJAJvZm1ApuwzDeT-G23k7MbP1V0W-zY

      - name: Add Android Platform
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already added"
          npx cap sync android

      - name: Patch AndroidManifest — Add Required Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Current permissions in manifest:"
            grep "uses-permission" "$MANIFEST" || echo "(none found)"

            # Add ACCESS_NETWORK_STATE if missing (required by Unity Ads SDK)
            if ! grep -q "ACCESS_NETWORK_STATE" "$MANIFEST"; then
              sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />|g' "$MANIFEST"
              echo "✅ Added ACCESS_NETWORK_STATE permission"
            else
              echo "✅ ACCESS_NETWORK_STATE already present"
            fi

            # Add INTERNET if somehow missing
            if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
              sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <application|g' "$MANIFEST"
              echo "✅ Added INTERNET permission"
            else
              echo "✅ INTERNET already present"
            fi

            echo "Final permissions:"
            grep "uses-permission" "$MANIFEST"
          else
            echo "❌ AndroidManifest.xml not found at $MANIFEST"
          fi

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Verify Unity Ads Plugin in Gradle
        env:
          UNITY_GAME_ID: "6104683"
          UNITY_PROJECT_ID: "db811c8a-0baf-4a79-bed2-441b81170297"
        run: |
          echo "=== Unity Ads Plugin Verification ==="
          echo "Game ID    : $UNITY_GAME_ID"
          echo "Project ID : $UNITY_PROJECT_ID"
          echo ""

          # The capacitor-unity-ads plugin already includes unity-ads:4.9.2 in its own build.gradle.
          # We must NOT add a duplicate implementation here — that causes duplicate class errors.
          # Just verify the plugin is present in the generated Capacitor settings.
          if [ -f "android/capacitor.settings.gradle" ]; then
            echo "Capacitor plugin settings:"
            cat android/capacitor.settings.gradle
          fi
          if [ -f "android/app/src/main/assets/capacitor.plugins.json" ]; then
            echo ""
            echo "Registered Capacitor plugins:"
            cat android/app/src/main/assets/capacitor.plugins.json
          fi

          # Only add Maven repo if not already present (for Unity Ads resolution)
          GRADLE="android/build.gradle"
          if [ -f "$GRADLE" ] && ! grep -q "storage.googleapis.com/unity-ads" "$GRADLE"; then
            sed -i 's|mavenCentral()|mavenCentral()\n        maven { url "https://storage.googleapis.com/unity-ads-android/sdk/" }|g' "$GRADLE"
            echo "✅ Added Unity Ads Maven repo to root build.gradle"
          else
            echo "✅ Unity Ads Maven repo already present or not needed"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bharat-Cash-Gold-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
