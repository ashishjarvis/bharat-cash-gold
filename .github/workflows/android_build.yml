name: Build Bharat Cash Gold APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ylbuuvimelaariosriwk.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsYnV1dmltZWxhYXJpb3NyaXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2NTE1MjksImV4cCI6MjA4NTIyNzUyOX0.G9bmLzE2ScnNJAJvZm1ApuwzDeT-G23k7MbP1V0W-zY

      - name: Add Android Platform
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already added"
          npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Inject Unity Ads SDK into Gradle
        run: |
          GRADLE="android/build.gradle"
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$GRADLE" ] && ! grep -q "unity-ads" "$GRADLE"; then
            sed -i 's|mavenCentral()|mavenCentral()\n        maven { url "https://storage.googleapis.com/unity-ads-android/sdk/" }|g' "$GRADLE"
            echo "Added Unity Ads Maven repo"
          fi
          if [ -f "$APP_GRADLE" ] && ! grep -q "unity-ads" "$APP_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.unity3d.ads:unity-ads:4.12.4"' "$APP_GRADLE"
            echo "Added Unity Ads dependency"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bharat-Cash-Gold-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
