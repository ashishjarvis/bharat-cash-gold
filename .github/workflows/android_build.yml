name: Build Bharat Cash Gold APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Init & Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Add Unity Ads SDK to Android
        run: |
          # Inject Unity Ads Maven repository into android/build.gradle
          GRADLE_FILE="android/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i '/allprojects {/,/repositories {/ {
              /repositories {/ a\        maven { url "https://storage.googleapis.com/unity-ads-android/sdk/" }
            }' "$GRADLE_FILE"
          fi

          # Add Unity Ads dependency to android/app/build.gradle
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i '/dependencies {/ a\    implementation "com.unity3d.ads:unity-ads:4.12.4"' "$APP_GRADLE"
          fi

      - name: Add capacitor-unity-ads plugin to Android
        run: |
          cd android
          # Ensure the capacitor-unity-ads plugin is synced
          npx cap sync android 2>/dev/null || true

      - name: Enable ProGuard for Release
        run: |
          APP_GRADLE="android/app/build.gradle"
          if grep -q "minifyEnabled false" "$APP_GRADLE"; then
            sed -i 's/minifyEnabled false/minifyEnabled true/g' "$APP_GRADLE"
            sed -i 's/shrinkResources false/shrinkResources true/g' "$APP_GRADLE"
          fi

      - name: Build ARM64 Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="" \
            --stacktrace 2>/dev/null || ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bharat-Cash-Gold-APK
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
